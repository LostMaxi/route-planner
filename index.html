<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>動線規劃</title>
<link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#080a0e;
  --glass:rgba(8,10,14,0.88);
  --glass-b:rgba(8,10,14,0.96);
  --border:rgba(255,255,255,0.07);
  --border-hi:rgba(255,255,255,0.13);
  --text:#ccd0dc;
  --muted:#48566a;
  --hi:#e4e8f2;
  --red:#ff2a2a;--amber:#ff9500;--green:#00e07a;--blue:#0055ff;
  --sans:'Inter','Noto Sans TC',sans-serif;
  --mono:'DM Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);}
body{font-family:var(--sans);font-size:12px;color:var(--text);}
#map{position:fixed;inset:0;}
#ant-canvas{position:fixed;inset:0;z-index:5;pointer-events:none;}

/* ─ UI overlay ─ */
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;padding:14px;display:grid;
  grid-template-rows:auto 1fr auto;grid-template-columns:auto 1fr auto;gap:10px;}
#ui>*{pointer-events:all;}

/* ─ HUD badge ─ 3× original size */
#hud{
  grid-column:1/-1;grid-row:1;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;
}
#brand{
  pointer-events:all;
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:8px;padding:8px 14px;backdrop-filter:blur(16px);flex-shrink:0;
}
#brand strong{display:block;font-size:13px;font-weight:500;color:var(--hi);}
#brand span{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;}

#search-wrap{
  pointer-events:all;
  display:flex;background:var(--glass-b);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;backdrop-filter:blur(16px);max-width:300px;
}
#search-input{flex:1;background:none;border:none;padding:9px 12px;color:var(--hi);font-family:var(--sans);font-size:11px;outline:none;}
#search-input::placeholder{color:var(--muted);}
#search-btn{background:none;border:none;border-left:1px solid var(--border);color:var(--muted);padding:0 12px;cursor:pointer;font-size:14px;transition:color .15s;}
#search-btn:hover{color:var(--hi);}

/* ── Mode badge (HUD instruction) — 3× font & padding ── */
#mode-badge{
  pointer-events:none;
  position:fixed;
  top:72px;
  left:50%;
  transform:translateX(-50%);
  z-index:50;
  background:rgba(0,0,0,0.72);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:14px;
  padding:18px 40px;
  font-size:33px;
  color:#fff;
  backdrop-filter:blur(20px);
  display:none;
  letter-spacing:.01em;
  line-height:1.5;
  font-weight:300;
  white-space:pre-wrap;
  text-align:center;
  max-width:90vw;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
#mode-badge .badge-key{
  display:inline-block;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:6px;
  padding:2px 10px;
  font-size:24px;
  font-family:var(--mono);
  margin:0 4px;
  vertical-align:middle;
}
#mode-badge.on{display:block;}
@media(max-width:600px){
  #mode-badge{font-size:22px;padding:14px 22px;}
  #mode-badge .badge-key{font-size:18px;}
}

/* ─ Left panel ─ */
#left-panel{
  grid-column:1;grid-row:2/4;
  display:flex;flex-direction:column;gap:8px;align-self:end;
}

/* ─ Right panel ─ */
#right-panel{
  grid-column:3;grid-row:2/4;
  display:flex;flex-direction:column;gap:8px;align-self:end;align-items:flex-end;
}

/* ─ Bottom centre (compass) ─ */
#compass-wrap{
  grid-column:2;grid-row:3;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  justify-self:center;align-self:end;
}

/* ─ Shared panel shell ─ */
.panel{
  background:var(--glass-b);border:1px solid var(--border);
  border-radius:10px;backdrop-filter:blur(16px);overflow:hidden;
}
.ph{padding:8px 12px 6px;font-size:9px;color:var(--muted);
  letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);
  border-bottom:1px solid var(--border);}

/* ─ Color row ─ */
#color-row{display:flex;gap:7px;padding:10px 12px;}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0;}
.sw:hover{transform:scale(1.15);}
.sw.on{border-color:#fff;}

/* ─ Den toggle ─ */
#den-row{display:flex;border-top:1px solid var(--border);}
.db{flex:1;background:none;border:none;padding:7px 0;font-family:var(--mono);font-size:10px;color:var(--muted);cursor:pointer;transition:background .15s,color .15s;letter-spacing:.04em;}
.db:first-child{border-right:1px solid var(--border);}
.db.on{background:rgba(255,255,255,0.06);color:var(--hi);}

/* ─ Draw buttons ─ */
.tb{width:100%;background:none;border:none;border-top:1px solid var(--border);padding:9px 12px;color:var(--text);font-family:var(--sans);font-size:11px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:background .15s,color .15s;}
.tb:hover{background:rgba(255,255,255,0.04);color:var(--hi);}
.tb.on{background:rgba(255,255,255,0.07);color:#fff;}
.dot-ic{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.ring-ic{width:8px;height:8px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;}

/* ─ Layers list ─ */
#layers-list{max-height:160px;overflow-y:auto;}
#layers-list::-webkit-scrollbar{width:3px;}
#layers-list::-webkit-scrollbar-thumb{background:var(--border-hi);}
.lr{display:flex;align-items:center;gap:6px;padding:6px 12px;border-top:1px solid var(--border);transition:background .1s;}
.lr:hover{background:rgba(255,255,255,0.03);}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.li{flex:1;font-size:9px;color:var(--muted);font-family:var(--mono);}
.lden{font-size:9px;color:var(--muted);font-family:var(--mono);}
.ldel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;transition:color .1s;}
.ldel:hover{color:var(--red);}
#layers-empty{padding:12px;font-size:10px;color:var(--muted);text-align:center;}

/* ─ Params panel (right) ─ */
#params-panel{width:210px;overflow:hidden;}
.pr{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border);}
.pr:last-child{border-bottom:none;}
.pr-label{font-size:10px;color:var(--text);flex-shrink:0;min-width:52px;}
.pr-val{font-size:9px;color:var(--muted);font-family:var(--mono);min-width:42px;text-align:right;flex-shrink:0;white-space:nowrap;}
input[type=range]{
  flex:1;-webkit-appearance:none;height:2px;
  background:rgba(255,255,255,0.10);border-radius:99px;outline:none;
  margin:0 6px;  /* prevent thumb from clipping panel edges */
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;border-radius:50%;
  background:var(--hi);cursor:pointer;
  box-shadow:0 0 0 2px rgba(255,255,255,0.15);
}
/* Firefox thumb */
input[type=range]::-moz-range-thumb{
  width:11px;height:11px;border-radius:50%;border:none;
  background:var(--hi);cursor:pointer;
  box-shadow:0 0 0 2px rgba(255,255,255,0.15);
}
input[type=range]::-moz-range-track{
  height:2px;background:rgba(255,255,255,0.10);border-radius:99px;border:none;
}
/* Preview strip */
#preview-strip{
  border-top:1px solid var(--border);
  height:48px;position:relative;overflow:hidden;
}
#preview-canvas{width:100%;height:100%;display:block;}
/* toggle */
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--border);}
.tog-label{font-size:10px;color:var(--text);}
.tog{position:relative;width:28px;height:15px;cursor:pointer;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;}
.tog-tr{position:absolute;inset:0;background:rgba(255,255,255,0.10);border-radius:99px;border:1px solid var(--border);transition:background .2s;}
.tog input:checked+.tog-tr{background:rgba(255,255,255,0.28);}
.tog-th{position:absolute;top:2px;left:2px;width:9px;height:9px;background:var(--hi);border-radius:50%;transition:transform .2s;}
.tog input:checked~.tog-th{transform:translateX(13px);}
.apply-btn{width:100%;background:none;border:none;border-top:1px solid var(--border);padding:8px;color:var(--muted);font-family:var(--sans);font-size:10px;cursor:pointer;transition:color .15s,background .15s;text-align:center;}
.apply-btn:hover{background:rgba(255,255,255,0.05);color:var(--hi);}

/* ─ Zoom strip ─ */
#zoom-strip{background:var(--glass-b);border:1px solid var(--border);border-radius:8px;backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;overflow:hidden;}
.zb{width:34px;height:30px;background:none;border:none;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.zb:hover{background:rgba(255,255,255,0.08);}
.zb:active{transform:scale(.93);}
#zoom-val{font-size:9px;color:var(--muted);font-family:var(--mono);padding:3px 0;letter-spacing:.04em;}
.z-sep{width:22px;height:1px;background:var(--border);}

/* ─ Save panel ─ */
#save-panel{width:188px;}
.save-row{display:flex;border-bottom:1px solid var(--border);}
#save-name{flex:1;background:none;border:none;padding:7px 10px;color:var(--hi);font-family:var(--sans);font-size:10px;outline:none;}
#save-name::placeholder{color:var(--muted);}
#save-btn{background:none;border:none;border-left:1px solid var(--border);color:var(--muted);padding:0 10px;cursor:pointer;font-size:10px;font-family:var(--sans);transition:color .15s;}
#save-btn:hover{color:var(--hi);}
#save-list{max-height:110px;overflow-y:auto;}
#save-list::-webkit-scrollbar{width:3px;}
#save-list::-webkit-scrollbar-thumb{background:var(--border-hi);}
.si{display:flex;align-items:center;gap:5px;padding:5px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.si:hover{background:rgba(255,255,255,0.04);}
.si-name{flex:1;font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.si-meta{font-size:9px;color:var(--muted);font-family:var(--mono);flex-shrink:0;}
.si-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0 2px;transition:color .1s;}
.si-del:hover{color:var(--red);}
.si-empty{font-size:10px;color:var(--muted);text-align:center;padding:10px;}
.act-row{display:flex;flex-wrap:wrap;border-top:1px solid var(--border);}
.act-row-2{display:flex;border-top:1px solid var(--border);}
.act{flex:1;background:none;border:none;padding:7px;font-family:var(--sans);font-size:10px;color:var(--muted);cursor:pointer;transition:background .15s,color .15s;text-align:center;}
.act:hover{background:rgba(255,255,255,0.05);color:var(--hi);}
.act:first-child{border-right:1px solid var(--border);}
.act.dng:hover{color:var(--red);}

/* ─ Compass ─ */
#compass{width:50px;height:50px;border-radius:50%;background:var(--glass-b);border:1px solid var(--border-hi);backdrop-filter:blur(16px);cursor:grab;display:flex;align-items:center;justify-content:center;user-select:none;transition:border-color .2s;}
#compass:hover{border-color:rgba(255,255,255,0.24);}
#compass:active{cursor:grabbing;}
#compass-needle{display:flex;align-items:center;justify-content:center;transition:transform .06s linear;}
#bearing-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);text-align:center;}
#compass-reset{font-size:9px;color:var(--muted);font-family:var(--mono);cursor:pointer;padding:2px 8px;border:1px solid var(--border);border-radius:3px;background:var(--glass-b);backdrop-filter:blur(16px);transition:color .15s,border-color .15s;}
#compass-reset:hover{color:var(--hi);border-color:var(--border-hi);}

/* ─ Toast ─ */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--glass-b);border:1px solid var(--border-hi);border-radius:6px;padding:10px 20px;font-size:12px;color:var(--hi);opacity:0;transition:opacity .2s,transform .2s;z-index:9999;pointer-events:none;white-space:nowrap;backdrop-filter:blur(16px);}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* MapLibre strip */
.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-bottom-left,.maplibregl-ctrl-top-right,.maplibregl-ctrl-top-left{display:none!important;}
.maplibregl-canvas.xhair{cursor:crosshair!important;}

@media(max-width:640px){
  #mode-badge{font-size:18px;padding:10px 20px;}
  #params-panel,#save-panel{width:160px;}
  #search-wrap{max-width:180px;}
}
</style>
</head>
<body>
<div id="map"></div>
<canvas id="ant-canvas"></canvas>

<div id="ui">

  <!-- Top HUD row -->
  <div id="hud">
    <div id="brand"><strong>動線規劃</strong><span>route planner</span></div>
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="搜尋地點..." autocomplete="off">
      <button id="search-btn">→</button>
    </div>
    <div id="mode-badge"></div>
  </div>

  <!-- Left panel -->
  <div id="left-panel">
    <!-- Draw tools -->
    <div class="panel">
      <div class="ph">動線設定</div>
      <div id="color-row">
        <div class="sw on" data-c="#00e07a" style="background:#00e07a" title="入口/順暢"></div>
        <div class="sw" data-c="#ff2a2a" style="background:#ff2a2a" title="出口/壅塞"></div>
        <div class="sw" data-c="#ff9500" style="background:#ff9500" title="注意/交會"></div>
        <div class="sw" data-c="#0055ff" style="background:#0055ff" title="行人/工作"></div>
      </div>
      <div id="den-row">
        <button class="db on" data-d="L">L 流暢</button>
        <button class="db" data-d="F">F 壅塞</button>
      </div>
      <button class="tb" id="draw-btn"><span class="dot-ic"></span>繪製路徑</button>
      <button class="tb" id="round-btn"><span class="ring-ic"></span>放置圓環</button>
    </div>
    <!-- Layers -->
    <div class="panel">
      <div class="ph">圖層</div>
      <div id="layers-list"><div id="layers-empty">尚無動線</div></div>
    </div>
  </div>

  <!-- Compass centre -->
  <div id="compass-wrap">
    <div id="compass">
      <div id="compass-needle">
        <svg width="28" height="28" viewBox="0 0 28 28">
          <polygon points="14,3 17,14 14,12 11,14" fill="#d4d8e2"/>
          <polygon points="14,25 17,14 14,16 11,14" fill="#48566a"/>
          <text x="14" y="7.5" text-anchor="middle" font-size="4.5" fill="#d4d8e2" font-family="sans-serif">N</text>
        </svg>
      </div>
    </div>
    <div id="bearing-lbl">0°</div>
    <div id="compass-reset">重置方位</div>
  </div>

  <!-- Right panel -->
  <div id="right-panel">
    <!-- Zoom -->
    <div id="zoom-strip">
      <button class="zb" id="zi">+</button>
      <div class="z-sep"></div>
      <div id="zoom-val">z16</div>
      <div class="z-sep"></div>
      <button class="zb" id="zo">−</button>
    </div>

    <!-- Params -->
    <div class="panel" id="params-panel">
      <div class="ph">動線參數</div>
      <div class="pr">
        <span class="pr-label">流速</span>
        <input type="range" id="sl-speed" min="200" max="3000" step="100" value="800">
        <span class="pr-val" id="vl-speed">中</span>
      </div>
      <div class="pr">
        <span class="pr-label">線寬</span>
        <input type="range" id="sl-weight" min="2" max="14" step="1" value="4">
        <span class="pr-val" id="vl-weight">4</span>
      </div>
      <div class="pr">
        <span class="pr-label">虛線間距</span>
        <input type="range" id="sl-gap" min="1" max="8" step="0.5" value="2">
        <span class="pr-val" id="vl-gap">2</span>
      </div>
      <div class="pr">
        <span class="pr-label">線條透明</span>
        <input type="range" id="sl-opa" min="10" max="100" step="5" value="90">
        <span class="pr-val" id="vl-opa">90%</span>
      </div>
      <div class="ph" style="margin-top:0">車輛動畫</div>
      <div class="tog-row">
        <span class="tog-label">顯示車輛</span>
        <label class="tog"><input type="checkbox" id="car-on" checked><div class="tog-tr"></div><div class="tog-th"></div></label>
      </div>
      <div class="pr">
        <span class="pr-label">車速</span>
        <input type="range" id="sl-cspd" min="0.2" max="4" step="0.1" value="1">
        <span class="pr-val" id="vl-cspd">1×</span>
      </div>
      <div class="pr">
        <span class="pr-label">車輛數</span>
        <input type="range" id="sl-cnum" min="1" max="5" step="1" value="1">
        <span class="pr-val" id="vl-cnum">1</span>
      </div>
      <div class="pr">
        <span class="pr-label">車長</span>
        <input type="range" id="sl-clen" min="8" max="40" step="2" value="20">
        <span class="pr-val" id="vl-clen">20</span>
      </div>
      <div class="pr">
        <span class="pr-label">車寬</span>
        <input type="range" id="sl-cwid" min="4" max="20" step="1" value="10">
        <span class="pr-val" id="vl-cwid">10</span>
      </div>
      <div class="ph" style="margin-top:0">預覽</div>
      <div id="preview-strip"><canvas id="preview-canvas"></canvas></div>
      <button class="apply-btn" id="apply-btn">套用至所有動線 →</button>
    </div>

    <!-- Save -->
    <div class="panel" id="save-panel">
      <div class="ph">儲存規劃</div>
      <div class="save-row">
        <input id="save-name" type="text" placeholder="名稱（選填）">
        <button id="save-btn">儲存</button>
      </div>
      <div id="save-list"><div class="si-empty" id="sv-empty">尚無記錄</div></div>
      <div class="act-row">
        <button class="act" id="export-btn">匯出 JSON</button>
        <button class="act" id="import-btn">匯入 JSON</button>
      </div>
      <div class="act-row-2">
        <button class="act" id="share-btn">分享連結</button>
        <button class="act dng" id="clear-btn">清空</button>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
'use strict';
// ═══════════════════════
//  GLOBALS
// ═══════════════════════
const STORE_KEY = 'rp-v2-saves';
const ZOOM_STEP = 0.25;

const fp = {
  speed: 800, weight: 4, gap: 2, opa: 0.9,
  carOn: true, cspd: 1, cnum: 1, clen: 20, cwid: 10
};

const st = {
  color:'#00e07a', den:'L',
  drawing:false, rounding:false, pts:[], redo:[],
  paths:[], idSeq:0,
};

// ═══════════════════════
//  MAP
// ═══════════════════════
const map = new maplibregl.Map({
  container:'map',
  style:{
    version:8,
    glyphs:'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',
    sources:{gsat:{type:'raster',
      tiles:['https://mt0.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',
             'https://mt1.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',
             'https://mt2.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}'],
      tileSize:256,maxzoom:20,attribution:'© Google'}},
    layers:[{id:'gsat',type:'raster',source:'gsat',paint:{'raster-fade-duration':0}}]
  },
  center:[120.312,22.676], zoom:16, bearing:0, pitch:0,
  dragRotate:false, touchZoomRotate:false, attributionControl:false,
  // ── smoothness tuning ──
  antialias:true,                  // WebGL MSAA — smoother lines & edges
  fadeDuration:0,                  // no tile fade-in delay — instant sharp
  bearingSnap:0,                   // no bearing snap threshold — fluid rotation
  maxTileCacheSize:200,            // cache more tiles — less reload flicker
  refreshExpiredTiles:false,       // don't re-fetch during interaction
  trackResize:true,
  renderWorldCopies:false,
  pixelRatio:Math.min(window.devicePixelRatio||1, 2), // retina crisp but capped
});

// Smoother zoom/pan inertia

// ═══════════════════════
let cdrag=false,cAngle0=0,cBear0=0;
function pAngle(e,el){
  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  const px=(e.touches?e.touches[0].clientX:e.clientX)-cx;
  const py=(e.touches?e.touches[0].clientY:e.clientY)-cy;
  return Math.atan2(py,px)*180/Math.PI;
}
function setBearing(b){
  const nb=((b%360)+360)%360;
  map.easeTo({bearing:nb,duration:0});
  document.getElementById('compass-needle').style.transform=`rotate(${nb}deg)`;
  document.getElementById('bearing-lbl').textContent=Math.round(nb)+'°';
}
const cEl=document.getElementById('compass');
cEl.addEventListener('mousedown',e=>{cdrag=true;cAngle0=pAngle(e,cEl);cBear0=map.getBearing();e.preventDefault();});
cEl.addEventListener('touchstart',e=>{cdrag=true;cAngle0=pAngle(e,cEl);cBear0=map.getBearing();},{passive:true});
document.addEventListener('mousemove',e=>{if(!cdrag)return;setBearing(cBear0+pAngle(e,cEl)-cAngle0);});
document.addEventListener('touchmove',e=>{if(!cdrag)return;setBearing(cBear0+pAngle(e,cEl)-cAngle0);},{passive:true});
document.addEventListener('mouseup',()=>{cdrag=false;});
document.addEventListener('touchend',()=>{cdrag=false;});
document.getElementById('compass-reset').onclick=()=>setBearing(0);

function setDrawing(on){
  st.drawing=on;
  if(!on){st.pts=[];st.redo=[];removeTmp();}
  else{document.activeElement&&document.activeElement.blur();}  // release input focus
  document.getElementById('draw-btn').classList.toggle('on',on);
  map.getCanvas().classList.toggle('xhair',on||st.rounding);
  badge(on?'點擊加入節點　雙擊完成　Ctrl+Z 還原　Ctrl+Y 重做　ESC 取消':'');
}
function setRounding(on){
  st.rounding=on;
  document.getElementById('round-btn').classList.toggle('on',on);
  map.getCanvas().classList.toggle('xhair',on||st.drawing);
  badge(on?'點擊地圖放置圓環中心　ESC 取消':'');
}
document.getElementById('draw-btn').onclick=()=>{
  if(st.rounding)setRounding(false);
  if(st.drawing){if(st.pts.length>=2)commitPath(st.pts,st.color,st.den);setDrawing(false);}
  else setDrawing(true);
};
document.getElementById('round-btn').onclick=()=>{
  if(st.drawing)setDrawing(false);
  setRounding(!st.rounding);
};
// Use CAPTURE phase so drawing undo/redo intercepts before any input element
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){setDrawing(false);setRounding(false);return;}
  if(!st.drawing)return;
  const isUndoRedo=(e.ctrlKey||e.metaKey)&&(e.key==='z'||e.key==='y');
  if(!isUndoRedo)return;
  // Block browser native undo/redo entirely while drawing
  e.preventDefault();e.stopPropagation();
  // Ctrl+Z (no shift): undo last point
  if(e.key==='z'&&!e.shiftKey){
    if(st.pts.length>0){st.redo.push(st.pts.pop());updateTmp();}
    return;
  }
  // Ctrl+Y or Ctrl+Shift+Z: redo
  if(e.key==='y'||(e.key==='z'&&e.shiftKey)){
    if(st.redo.length>0){st.pts.push(st.redo.pop());updateTmp();}
  }
},true);  // ← capture:true

// ═══════════════════════
//  TEMP LAYER
// ═══════════════════════
const TSRC='__tmp__',TLY='__tl__',TDT='__td__';
map.on('load',()=>{
  map.addSource(TSRC,{type:'geojson',data:eGeo()});
  map.addLayer({id:TLY,type:'line',source:TSRC,layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':['get','color'],'line-width':3,'line-dasharray':[4,3],'line-opacity':0.65}});
  map.addLayer({id:TDT,type:'circle',source:TSRC,filter:['==','$type','Point'],paint:{'circle-radius':4,'circle-color':['get','color'],'circle-opacity':0.9}});
  syncZoom();
  loadFromHash();
});
function eGeo(){return{type:'FeatureCollection',features:[]};}
function updateTmp(){
  if(!map.getSource(TSRC))return;
  const pts=st.pts,fs=[];
  if(pts.length===1)fs.push({type:'Feature',geometry:{type:'Point',coordinates:pts[0]},properties:{color:st.color}});
  else if(pts.length>=2)fs.push({type:'Feature',geometry:{type:'LineString',coordinates:pts},properties:{color:st.color}});
  map.getSource(TSRC).setData({type:'FeatureCollection',features:fs});
}
function removeTmp(){if(map.getSource(TSRC))map.getSource(TSRC).setData(eGeo());}

// ═══════════════════════
//  COMMIT PATH
// ═══════════════════════
function commitPath(coords,color,den){
  if(coords.length<2)return;
  // Guard: if map style not loaded yet, queue and retry after load
  if(!map.isStyleLoaded()){
    map.once('load',()=>commitPath(coords,color,den));
    return;
  }
  removeTmp();
  const id=++st.idSeq;
  const w=fp.weight+(den==='F'?2:0);

  // Source
  map.addSource(`p-src-${id}`,{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:coords},properties:{}}});

  // Layer 0: Dark outline for contrast on satellite
  map.addLayer({id:`p-bg-${id}`,type:'line',source:`p-src-${id}`,
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':'#000000','line-width':w+6,'line-opacity':0.5}});

  // Layer 1: Outer glow (color, semi-transparent)
  map.addLayer({id:`p-glow-${id}`,type:'line',source:`p-src-${id}`,
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':color,'line-width':w+4,'line-opacity':0.35}});

  // Layer 2: Core line (solid, visible)
  map.addLayer({id:`p-line-${id}`,type:'line',source:`p-src-${id}`,
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':color,'line-width':w,'line-opacity':fp.opa}});

  // Layer 3: Direction arrows along path
  map.addLayer({id:`p-arr-${id}`,type:'symbol',source:`p-src-${id}`,
    layout:{
      'symbol-placement':'line',
      'text-field':'▸',
      'text-size':16,
      'text-allow-overlap':true,
      'text-ignore-placement':true,
      'symbol-spacing':50,
      'text-rotation-alignment':'map',
      'text-keep-upright':false
    },
    paint:{'text-color':color,'text-opacity':0.85,'text-halo-color':'rgba(0,0,0,.4)','text-halo-width':1}});

  // Layer 4: Density label at midpoint
  const midC=coords[Math.floor(coords.length/2)];
  map.addSource(`p-mid-${id}`,{type:'geojson',data:{type:'Feature',geometry:{type:'Point',coordinates:midC},properties:{den}}});
  map.addLayer({id:`p-lbl-${id}`,type:'symbol',source:`p-mid-${id}`,
    layout:{'text-field':['get','den'],'text-size':12,
      'text-font':['Open Sans Regular','Arial Unicode MS Regular'],
      'text-allow-overlap':true,'text-ignore-placement':true},
    paint:{'text-color':'#fff','text-halo-color':color,'text-halo-width':3}});

  // Layer 5+6: Entry arrow (head) and Exit arrow (tail)
  // Compute bearings for head and tail
  const headBear=(()=>{
    const dx=(coords[1][0]-coords[0][0])*111320*Math.cos(coords[0][1]*Math.PI/180);
    const dy=(coords[1][1]-coords[0][1])*111320;
    return Math.atan2(dx,dy)*180/Math.PI;
  })();
  const tailBear=(()=>{
    const n=coords.length;
    const dx=(coords[n-1][0]-coords[n-2][0])*111320*Math.cos(coords[n-2][1]*Math.PI/180);
    const dy=(coords[n-1][1]-coords[n-2][1])*111320;
    return Math.atan2(dx,dy)*180/Math.PI;
  })();

  // Head: entry arrow (▶ pointing into the path)
  map.addSource(`p-head-${id}`,{type:'geojson',data:{type:'Feature',geometry:{type:'Point',coordinates:coords[0]},properties:{bearing:headBear}}});
  map.addLayer({id:`p-harr-${id}`,type:'symbol',source:`p-head-${id}`,
    layout:{
      'icon-image':'','text-field':'▶','text-size':20,
      'text-rotate':['get','bearing'],
      'text-rotation-alignment':'map',
      'text-allow-overlap':true,'text-ignore-placement':true
    },
    paint:{'text-color':color,'text-opacity':0.95,'text-halo-color':'rgba(0,0,0,.6)','text-halo-width':2}});

  // Tail: exit arrow (▶ pointing out of the path)
  map.addSource(`p-tail-${id}`,{type:'geojson',data:{type:'Feature',geometry:{type:'Point',coordinates:coords[coords.length-1]},properties:{bearing:tailBear}}});
  map.addLayer({id:`p-tarr-${id}`,type:'symbol',source:`p-tail-${id}`,
    layout:{
      'icon-image':'','text-field':'▶','text-size':20,
      'text-rotate':['get','bearing'],
      'text-rotation-alignment':'map',
      'text-allow-overlap':true,'text-ignore-placement':true
    },
    paint:{'text-color':color,'text-opacity':0.95,'text-halo-color':'rgba(0,0,0,.6)','text-halo-width':2}});

  const pathObj={id,coords,color,den,
    layers:[`p-bg-${id}`,`p-glow-${id}`,`p-line-${id}`,`p-arr-${id}`,`p-lbl-${id}`,`p-harr-${id}`,`p-tarr-${id}`],
    sources:[`p-src-${id}`,`p-mid-${id}`,`p-head-${id}`,`p-tail-${id}`],
    dashRaf:null,dashPhase:0,
    carMarkers:[],carRafs:[]};

  st.paths.push(pathObj);
  if(fp.carOn)startCars(pathObj);
  renderLayers();
  startAntPath();
}

// ═══════════════════════
//  ANT-PATH CANVAS OVERLAY (flowing dashed lines)
// ═══════════════════════
const antCv=document.getElementById('ant-canvas');
const antCtx=antCv.getContext('2d');
let antOff=0, antRaf=null;

function resizeAntCanvas(){
  const dpr=window.devicePixelRatio||1;
  antCv.width=window.innerWidth*dpr;
  antCv.height=window.innerHeight*dpr;
  antCv.style.width=window.innerWidth+'px';
  antCv.style.height=window.innerHeight+'px';
  antCtx.setTransform(dpr,0,0,dpr,0,0);
}
resizeAntCanvas();
window.addEventListener('resize',resizeAntCanvas);

function drawAnt(){
  antCtx.clearRect(0,0,antCv.width,antCv.height);
  if(st.paths.length===0)return;
  st.paths.forEach(p=>{
    if(p.coords.length<2)return;
    const pts=p.coords.map(c=>map.project(c));
    // Draw flowing dashed line in path's own color
    antCtx.beginPath();
    antCtx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) antCtx.lineTo(pts[i].x,pts[i].y);
    // Parse hex color to rgba for the flowing dash
    const hc=p.color;
    const r=parseInt(hc.slice(1,3),16),g=parseInt(hc.slice(3,5),16),b=parseInt(hc.slice(5,7),16);
    antCtx.strokeStyle=`rgba(${r},${g},${b},0.7)`;
    antCtx.lineWidth=Math.max(2,fp.weight*0.6);
    antCtx.lineCap='butt';
    antCtx.setLineDash([10,14]);
    antCtx.lineDashOffset=-antOff;
    antCtx.stroke();
    // Second pass: white highlight for contrast on dark satellite
    antCtx.strokeStyle='rgba(255,255,255,0.2)';
    antCtx.lineWidth=Math.max(1,fp.weight*0.3);
    antCtx.lineDashOffset=-antOff-7;
    antCtx.stroke();
    antCtx.setLineDash([]);
  });
}

function antFrame(){
  const spd=Math.max(0.3,(3000-fp.speed)/2000);
  antOff+=spd;
  if(antOff>2400)antOff-=2400;
  drawAnt();
  antRaf=requestAnimationFrame(antFrame);
}

function startAntPath(){
  if(!antRaf)antRaf=requestAnimationFrame(antFrame);
}
function stopAntPath(){
  if(antRaf){cancelAnimationFrame(antRaf);antRaf=null;}
}

// Redraw on map move/zoom so canvas stays synced
map.on('move',drawAnt);
map.on('zoom',drawAnt);
map.on('rotate',drawAnt);
map.on('pitch',drawAnt);

// ═══════════════════════
//  PREVIEW STRIP (mini animated path preview in params panel)
// ═══════════════════════
const pvCv=document.getElementById('preview-canvas');
const pvCtx=pvCv.getContext('2d');
let pvOff=0,pvRaf=null,pvCarX=0;

function resizePvCanvas(){
  const r=pvCv.parentElement.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  pvCv.width=r.width*dpr;pvCv.height=r.height*dpr;
  pvCv.style.width=r.width+'px';pvCv.style.height=r.height+'px';
  pvCtx.setTransform(dpr,0,0,dpr,0,0);
}
resizePvCanvas();
window.addEventListener('resize',resizePvCanvas);

function drawPreview(){
  const W=pvCv.parentElement.getBoundingClientRect().width;
  const H=pvCv.parentElement.getBoundingClientRect().height;
  pvCtx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  // Draw a gentle S-curve as preview path
  const pts=[];
  for(let i=0;i<=60;i++){
    const t=i/60;
    const x=12+t*(W-24);
    const y=cy+Math.sin(t*Math.PI*2)*((H/2)-8);
    pts.push([x,y]);
  }
  const c=st.color;
  const w=fp.weight;

  // BG outline
  pvCtx.beginPath();pts.forEach((p,i)=>i?pvCtx.lineTo(p[0],p[1]):pvCtx.moveTo(p[0],p[1]));
  pvCtx.strokeStyle='rgba(0,0,0,0.5)';pvCtx.lineWidth=w+4;pvCtx.lineCap='round';pvCtx.lineJoin='round';pvCtx.stroke();

  // Color glow
  pvCtx.beginPath();pts.forEach((p,i)=>i?pvCtx.lineTo(p[0],p[1]):pvCtx.moveTo(p[0],p[1]));
  pvCtx.strokeStyle=c;pvCtx.globalAlpha=0.35;pvCtx.lineWidth=w+2;pvCtx.stroke();pvCtx.globalAlpha=1;

  // Core line
  pvCtx.beginPath();pts.forEach((p,i)=>i?pvCtx.lineTo(p[0],p[1]):pvCtx.moveTo(p[0],p[1]));
  pvCtx.strokeStyle=c;pvCtx.globalAlpha=fp.opa;pvCtx.lineWidth=w;pvCtx.stroke();pvCtx.globalAlpha=1;

  // AntPath flowing dash
  const hr=parseInt(c.slice(1,3),16),hg=parseInt(c.slice(3,5),16),hb=parseInt(c.slice(5,7),16);
  pvCtx.beginPath();pts.forEach((p,i)=>i?pvCtx.lineTo(p[0],p[1]):pvCtx.moveTo(p[0],p[1]));
  pvCtx.strokeStyle=`rgba(${hr},${hg},${hb},0.7)`;
  pvCtx.lineWidth=Math.max(2,w*0.6);pvCtx.lineCap='butt';
  pvCtx.setLineDash([10,14]);pvCtx.lineDashOffset=-pvOff;pvCtx.stroke();
  pvCtx.strokeStyle='rgba(255,255,255,0.2)';pvCtx.lineWidth=Math.max(1,w*0.3);
  pvCtx.lineDashOffset=-pvOff-7;pvCtx.stroke();pvCtx.setLineDash([]);

  // Entry arrow at start
  pvCtx.font='14px sans-serif';pvCtx.textAlign='center';pvCtx.textBaseline='middle';
  pvCtx.fillStyle=c;pvCtx.save();
  pvCtx.translate(pts[0][0],pts[0][1]);
  const a0=Math.atan2(pts[2][1]-pts[0][1],pts[2][0]-pts[0][0]);
  pvCtx.rotate(a0);pvCtx.fillText('▶',0,0);pvCtx.restore();

  // Exit arrow at end
  pvCtx.save();
  const ln=pts.length;
  pvCtx.translate(pts[ln-1][0],pts[ln-1][1]);
  const a1=Math.atan2(pts[ln-1][1]-pts[ln-3][1],pts[ln-1][0]-pts[ln-3][0]);
  pvCtx.rotate(a1);pvCtx.fillText('▶',0,0);pvCtx.restore();

  // Mini car
  if(fp.carOn){
    const ci=Math.floor(pvCarX)%pts.length;
    const ni=Math.min(ci+1,pts.length-1);
    const cp=pts[ci],np=pts[ni];
    const carA=Math.atan2(np[1]-cp[1],np[0]-cp[0]);
    pvCtx.save();pvCtx.translate(cp[0],cp[1]);pvCtx.rotate(carA);
    const cl=fp.clen*0.6,cw=fp.cwid*0.6,cr=Math.round(cw*0.22);
    pvCtx.fillStyle=c;
    pvCtx.beginPath();
    // Rounded rect
    pvCtx.moveTo(-cl/2+cr,-cw/2);pvCtx.lineTo(cl/2-cr,-cw/2);
    pvCtx.arcTo(cl/2,-cw/2,cl/2,-cw/2+cr,cr);pvCtx.lineTo(cl/2,cw/2-cr);
    pvCtx.arcTo(cl/2,cw/2,cl/2-cr,cw/2,cr);pvCtx.lineTo(-cl/2+cr,cw/2);
    pvCtx.arcTo(-cl/2,cw/2,-cl/2,cw/2-cr,cr);pvCtx.lineTo(-cl/2,-cw/2+cr);
    pvCtx.arcTo(-cl/2,-cw/2,-cl/2+cr,-cw/2,cr);
    pvCtx.fill();
    // headlights
    pvCtx.fillStyle='rgba(255,245,180,0.9)';pvCtx.fillRect(cl/2-2,-cw/2+1,2,cw*0.3);pvCtx.fillRect(cl/2-2,cw/2-1-cw*0.3,2,cw*0.3);
    pvCtx.restore();
  }
}

function pvFrame(){
  const spd=Math.max(0.3,(3000-fp.speed)/2000);
  pvOff+=spd;if(pvOff>2400)pvOff-=2400;
  const mps=Math.max(0.1,(3000-fp.speed)/3000)*fp.cspd*0.6;
  pvCarX+=mps;if(pvCarX>=60)pvCarX-=60;
  drawPreview();
  pvRaf=requestAnimationFrame(pvFrame);
}
// Start preview immediately
pvRaf=requestAnimationFrame(pvFrame);

// ═══════════════════════
//  CAR ANIMATION
// ═══════════════════════
// Build arc-length samples along path for even interpolation
function buildSamples(coords){
  const s=[{dist:0,c:coords[0],bearing:0}];
  let total=0;
  for(let i=1;i<coords.length;i++){
    const dx=(coords[i][0]-coords[i-1][0])*111320*Math.cos(coords[i-1][1]*Math.PI/180);
    const dy=(coords[i][1]-coords[i-1][1])*111320;
    const d=Math.sqrt(dx*dx+dy*dy);
    const bearing=Math.atan2(dx,dy)*180/Math.PI; // degrees from north
    total+=d;
    s.push({dist:total,c:coords[i],bearing});
  }
  return{s,total};
}
function sampleAt(s,total,t){
  const target=t*total;
  let lo=0,hi=s.length-1;
  while(lo<hi-1){const m=(lo+hi)>>1;if(s[m].dist<=target)lo=m;else hi=m;}
  const a=s[lo],b=s[hi];
  if(b.dist===a.dist)return{c:a.c,bearing:a.bearing};
  const f=(target-a.dist)/(b.dist-a.dist);
  return{c:[a.c[0]+(b.c[0]-a.c[0])*f,a.c[1]+(b.c[1]-a.c[1])*f],bearing:b.bearing};
}

function startCars(pathObj){
  stopCars(pathObj);
  const{s,total}=buildSamples(pathObj.coords);
  if(total<1)return;
  // Travel time: metres / (base speed px/s scaled by fp.cspd)
  // We map fp.speed(200-3000) to base metres/s(60-8) inversely
  const mps=Math.max(4,(3000-fp.speed)/48)*fp.cspd;
  const dur=(total/mps)*1000; // ms for full path

  for(let ci=0;ci<fp.cnum;ci++){
    const offset=ci/fp.cnum;
    // Car marker = positioned DOM element (MapLibre Marker)
    // Anchor wrapper: zero-size so MapLibre centers exactly on lngLat
    const anchor=document.createElement('div');
    anchor.style.cssText='width:0;height:0;position:relative;';
    // Car body: offset by -half dimensions so it centers on anchor
    const el=document.createElement('div');
    const r=Math.round(fp.cwid*0.22);
    el.style.cssText=`
      position:absolute;
      width:${fp.clen}px;height:${fp.cwid}px;
      left:${-fp.clen/2}px;top:${-fp.cwid/2}px;
      border-radius:${r}px;
      background:${pathObj.color};
      box-shadow:0 1px 6px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,0.18);
      transform-origin:${fp.clen/2}px ${fp.cwid/2}px;
      pointer-events:none;
      overflow:hidden;
    `;
    anchor.style.opacity='0';
    // Car direction: RIGHT edge = front (direction of travel)
    // Windshield (front-right area, translucent blue-white)
    const ws=document.createElement('div');
    ws.style.cssText=`position:absolute;top:${Math.round(fp.cwid*0.12)}px;right:${Math.round(fp.clen*0.15)}px;width:${Math.round(fp.clen*0.25)}px;height:${Math.round(fp.cwid*0.76)}px;background:rgba(180,210,240,0.3);border-radius:2px;border:1px solid rgba(255,255,255,0.1);`;
    el.appendChild(ws);
    // Headlights (RIGHT = front)
    const hlT=document.createElement('div');
    hlT.style.cssText=`position:absolute;top:1px;right:2px;width:3px;height:${Math.round(fp.cwid*0.32)}px;background:rgba(255,245,180,0.95);border-radius:2px;`;
    const hlB=document.createElement('div');
    hlB.style.cssText=`position:absolute;bottom:1px;right:2px;width:3px;height:${Math.round(fp.cwid*0.32)}px;background:rgba(255,245,180,0.95);border-radius:2px;`;
    // Taillights (LEFT = rear)
    const tlT=document.createElement('div');
    tlT.style.cssText=`position:absolute;top:1px;left:2px;width:3px;height:${Math.round(fp.cwid*0.32)}px;background:rgba(255,30,30,0.95);border-radius:2px;`;
    const tlB=document.createElement('div');
    tlB.style.cssText=`position:absolute;bottom:1px;left:2px;width:3px;height:${Math.round(fp.cwid*0.32)}px;background:rgba(255,30,30,0.95);border-radius:2px;`;
    el.append(hlT,hlB,tlT,tlB);
    anchor.appendChild(el);
    const marker=new maplibregl.Marker({element:anchor,anchor:'center'});
    const init=sampleAt(s,total,(offset)%1);
    marker.setLngLat(init.c).addTo(map);
    pathObj.carMarkers.push(marker);

    let t0=null;
    const carDur=dur;

    function carFrame(ts){
      if(!t0)t0=ts-offset*carDur;
      const elapsed=(ts-t0)%carDur;
      const t=elapsed/carDur;
      const{c,bearing}=sampleAt(s,total,t);

      // Fade in/out near endpoints
      const fade=0.07;
      let opa=1;
      if(t<fade)opa=t/fade;
      else if(t>1-fade)opa=(1-t)/fade;
      anchor.style.opacity=opa.toFixed(3);
      // Rotate car: geographic bearing → screen angle
      // bearing 0°=north, CSS rotate 0°=right, so offset -90°; subtract map bearing for rotation
      const screenAngle=bearing-map.getBearing()-90;
      el.style.transform=`rotate(${screenAngle}deg)`;

      marker.setLngLat(c);
      const raf=requestAnimationFrame(carFrame);
      pathObj.carRafs[ci]=raf;
    }
    const raf=requestAnimationFrame(carFrame);
    pathObj.carRafs.push(raf);
  }
}

function stopCars(p){
  p.carRafs.forEach(r=>cancelAnimationFrame(r));
  p.carRafs=[];
  p.carMarkers.forEach(m=>m.remove());
  p.carMarkers=[];
}

// ═══════════════════════
//  DELETE PATH
// ═══════════════════════
function deletePath(id){
  const idx=st.paths.findIndex(p=>p.id===id);if(idx===-1)return;
  const p=st.paths[idx];
  cancelAnimationFrame(p.dashRaf);
  stopCars(p);
  p.layers.forEach(l=>{try{map.removeLayer(l);}catch{}});
  p.sources.forEach(s=>{try{map.removeSource(s);}catch{}});
  st.paths.splice(idx,1);
  renderLayers();
}

// ═══════════════════════
//  LAYER LIST
// ═══════════════════════
function renderLayers(){
  const panel=document.getElementById('layers-list'),empty=document.getElementById('layers-empty');
  panel.querySelectorAll('.lr').forEach(e=>e.remove());
  if(st.paths.length===0){empty.style.display='';return;}
  empty.style.display='none';
  st.paths.forEach(p=>{
    const row=document.createElement('div');row.className='lr';
    row.innerHTML=`<div class="ld" style="background:${p.color}"></div><span class="li">#${p.id}</span><span class="lden">${p.den}</span><button class="ldel" data-id="${p.id}">×</button>`;
    row.querySelector('.ldel').onclick=e=>{e.stopPropagation();deletePath(p.id);};
    panel.appendChild(row);
  });
}

// ═══════════════════════
//  CIRCLE
// ═══════════════════════
function circleCoords(center,r,steps){
  const pts=[];
  for(let i=0;i<=steps;i++){
    const a=(i/steps)*2*Math.PI;
    pts.push([center[0]+(r/(111320*Math.cos(center[1]*Math.PI/180)))*Math.sin(a),center[1]+(r/111320)*Math.cos(a)]);
  }
  return pts;
}

// ═══════════════════════
//  CLEAR
// ═══════════════════════
function clearAll(silent){
  if(!silent&&!confirm('確定清空所有動線？'))return;
  [...st.paths].forEach(p=>deletePath(p.id));
  st.idSeq=0;
  stopAntPath();
  antCtx.clearRect(0,0,antCv.width,antCv.height);
  history.replaceState(null,'',location.pathname);
}
document.getElementById('clear-btn').onclick=()=>clearAll(false);

// ═══════════════════════
//  SAVE / LOAD
// ═══════════════════════
function getSaves(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'[]');}catch{return[];}}
function setSaves(s){localStorage.setItem(STORE_KEY,JSON.stringify(s));}
function serialize(){return st.paths.map(p=>({coords:p.coords,color:p.color,den:p.den}));}

function savePlan(){
  if(st.paths.length===0){toast('尚無動線可儲存');return;}
  const inp=document.getElementById('save-name');
  const now=new Date();
  const name=inp.value.trim()||`規劃 ${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const saves=getSaves();
  saves.unshift({id:Date.now(),name,ts:Date.now(),
    center:[map.getCenter().lng,map.getCenter().lat],
    zoom:map.getZoom(),bearing:map.getBearing(),
    fp:Object.assign({},fp),paths:serialize()});
  if(saves.length>20)saves.splice(20);
  setSaves(saves);inp.value='';renderSaveList();toast(`已儲存「${name}」`);
}

function loadPlan(entry){
  clearAll(true);
  map.jumpTo({center:entry.center,zoom:entry.zoom,bearing:entry.bearing||0});
  setBearing(entry.bearing||0);
  if(entry.fp){
    Object.assign(fp,entry.fp);
    syncSliderValues();
  }
  entry.paths.forEach(p=>{
    try{commitPath(p.coords,p.color,p.den);}catch(err){console.error('loadPlan commitPath:',err);}
  });
  toast(`已載入「${entry.name}」`);
}

function renderSaveList(){
  const list=document.getElementById('save-list'),empty=document.getElementById('sv-empty');
  list.querySelectorAll('.si').forEach(e=>e.remove());
  const saves=getSaves();
  if(saves.length===0){empty.style.display='';return;}
  empty.style.display='none';
  saves.forEach(s=>{
    const item=document.createElement('div');item.className='si';
    const d=new Date(s.ts);
    const meta=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    item.innerHTML=`<span class="si-name" title="${s.name}">${s.name}</span><span class="si-meta">${meta}</span><button class="si-del">×</button>`;
    item.addEventListener('click',e=>{if(!e.target.classList.contains('si-del'))loadPlan(s);});
    item.querySelector('.si-del').addEventListener('click',e=>{e.stopPropagation();if(confirm(`刪除「${s.name}」？`)){setSaves(getSaves().filter(x=>x.id!==s.id));renderSaveList();}});
    list.appendChild(item);
  });
}
document.getElementById('save-btn').onclick=savePlan;
document.getElementById('save-name').addEventListener('keydown',e=>{if(e.key==='Enter')savePlan();});

// ═══════════════════════
//  SHARE
// ═══════════════════════
document.getElementById('share-btn').onclick=()=>{
  if(st.paths.length===0){toast('尚無動線可分享');return;}
  const payload={c:[+map.getCenter().lng.toFixed(6),+map.getCenter().lat.toFixed(6)],
    z:+map.getZoom().toFixed(3),b:+map.getBearing().toFixed(1),
    fp:Object.assign({},fp),p:serialize()};
  const url=`${location.origin}${location.pathname}#${btoa(JSON.stringify(payload))}`;
  navigator.clipboard.writeText(url).then(()=>toast('分享連結已複製')).catch(()=>prompt('複製此連結：',url));
};

function loadFromHash(){
  const hash=location.hash.slice(1);if(!hash)return;
  try{
    const d=JSON.parse(atob(hash));
    if(d.c)map.jumpTo({center:d.c,zoom:d.z||16,bearing:d.b||0});
    if(d.b)setBearing(d.b);
    if(d.fp)Object.assign(fp,d.fp);
    if(d.p)d.p.forEach(p=>commitPath(p.coords,p.color,p.den));
    toast('已載入分享規劃');
  }catch{}
}

// ═══════════════════════
//  JSON EXPORT / IMPORT
// ═══════════════════════
function buildExportJSON(name) {
  return {
    version: '1.0',
    name: name || '動線規劃',
    createdAt: new Date().toISOString(),
    app: 'route-planner-v2',
    map: {
      center: [+map.getCenter().lng.toFixed(6), +map.getCenter().lat.toFixed(6)],
      zoom: +map.getZoom().toFixed(3),
      bearing: +map.getBearing().toFixed(1)
    },
    flowParams: Object.assign({}, fp),
    paths: st.paths.map(p => ({ id: p.id, color: p.color, den: p.den, coords: p.coords }))
  };
}

function syncSliderLabels() {
  document.getElementById('vl-speed').textContent = speedLbl(fp.speed);
  document.getElementById('vl-weight').textContent = fp.weight+'px';
  document.getElementById('vl-gap').textContent = fp.gap+'px';
  document.getElementById('vl-opa').textContent = Math.round(fp.opa*100)+'%';
  document.getElementById('vl-cspd').textContent = fp.cspd.toFixed(1)+'×';
  document.getElementById('vl-cnum').textContent = fp.cnum+'台';
  document.getElementById('vl-clen').textContent = fp.clen+'px';
  document.getElementById('vl-cwid').textContent = fp.cwid+'px';
}

function syncSliderValues() {
  const slMap = {speed:'sl-speed',weight:'sl-weight',gap:'sl-gap',
                 cspd:'sl-cspd',cnum:'sl-cnum',clen:'sl-clen',cwid:'sl-cwid'};
  Object.entries(slMap).forEach(([k,id]) => { const el=document.getElementById(id); if(el) el.value=fp[k]; });
  document.getElementById('sl-opa').value = Math.round(fp.opa*100);
  document.getElementById('car-on').checked = fp.carOn;
  syncSliderLabels();
}

function loadFromJSON(data) {
  if (!data.version || !data.paths || !Array.isArray(data.paths)) {
    toast('JSON 格式不正確'); return false;
  }
  clearAll(true);
  if (data.map) {
    map.jumpTo({ center: data.map.center, zoom: data.map.zoom, bearing: data.map.bearing || 0 });
    setBearing(data.map.bearing || 0);
  }
  if (data.flowParams) {
    Object.assign(fp, data.flowParams);
    syncSliderValues();
  }
  // Commit paths — must wait for map style to be ready
  let ok = 0, fail = 0;
  function doPaths() {
    data.paths.forEach(p => {
      try {
        if (p.coords && p.coords.length >= 2) {
          commitPath(p.coords, p.color || '#00e07a', p.den || 'L');
          ok++;
        }
      } catch(err) { fail++; console.error('commitPath failed:', err); }
    });
    toast(fail ? `已匯入 ${ok} 條動線（${fail} 條失敗）` : `已匯入 ${ok} 條動線`);
  }
  // If map style not loaded yet, wait for it
  if (map.isStyleLoaded()) { doPaths(); }
  else { map.once('load', doPaths); }
  return true;
}

document.getElementById('export-btn').addEventListener('click', () => {
  if (st.paths.length === 0) { toast('尚無動線可匯出'); return; }
  const name = document.getElementById('save-name').value.trim()
    || ('動線規劃_' + new Date().toISOString().slice(0,10));
  const json = JSON.stringify(buildExportJSON(name), null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([json], {type:'application/json;charset=utf-8'}));
  a.download = name.replace(/[/\\:*?"<>|]/g,'_') + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('已匯出 ' + a.download);
});

document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('import-file').value = '';
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change', function() {
  const file = this.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      // Strip UTF-8 BOM if present
      let text = e.target.result;
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      const data = JSON.parse(text);
      loadFromJSON(data);
    } catch(err) { toast('JSON 解析失敗：' + err.message); console.error('Import error:', err); }
  };
  reader.readAsText(file, 'utf-8');
});

// ═══════════════════════
//  INIT
// ═══════════════════════
renderSaveList();
</script>
